<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Essence of Poker Portfolio</title>
    <link rel="stylesheet" href="styles.css?v=frontend-modules-2">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>NLHE Portfolio</h1>
          <p id="portfolio-status">21 five-card assets before any cards are dealt</p>
        </div>
        <dl class="metrics">
          <div>
            <dt>Assets</dt>
            <dd id="asset-count">21</dd>
          </div>
          <div>
            <dt>Buckets</dt>
            <dd id="bucket-count">7462</dd>
          </div>
          <div>
            <dt>Combos</dt>
            <dd id="combo-count">2,598,960</dd>
          </div>
        </dl>
      </section>

      <section class="view-controls" aria-label="View settings">
        <fieldset class="view-mode-control" aria-label="Chart view">
          <label>
            <input type="radio" name="chart-mode" value="bell" checked>
            <span>Bell</span>
          </label>
          <label>
            <input type="radio" name="chart-mode" value="cdf-natural">
            <span>CDF natural</span>
          </label>
          <label>
            <input type="radio" name="chart-mode" value="cdf-straight">
            <span>CDF straight</span>
          </label>
        </fieldset>
        <label class="toggle-control theme-toggle">
          <input id="theme-toggle" type="checkbox">
          <span class="toggle-track" aria-hidden="true"></span>
          <span>Dark mode</span>
        </label>
        <button class="settings-page-button" id="config-page-button" type="button" data-page="config">Config</button>
      </section>

      <section class="hand-controls">
        <button class="control-button reset-button" id="new-hand-button" type="button">New hand</button>
        <button class="control-button street-nav-button" id="previous-street-button" type="button" title="Previous street" aria-label="Previous street">‹</button>
        <button class="control-button street-nav-button" id="next-street-button" type="button" title="Next viewed street" aria-label="Next viewed street">›</button>
        <button class="control-button deal-button" id="new-round-button" type="button">New round</button>
        <div class="holding-display" id="holding-display" aria-live="polite">
          <span class="holding-label">Holding</span>
          <span class="holding-card">H<sub>1</sub></span>
          <span class="holding-card">H<sub>2</sub></span>
        </div>
      </section>

      <section class="legend" id="legend"></section>
      <section class="portfolio-tabs" aria-label="Portfolio pages">
        <button class="page-tab is-active" id="hero-page-button" type="button" data-page="hero">Hero</button>
        <button class="page-tab" id="a2c-villain-page-button" type="button" data-page="a2cVillain">Villain</button>
        <button class="control-button showdown-button" id="showdown-button" type="button" hidden>Showdown</button>
      </section>
      <section class="asset-grid" id="asset-grid"></section>
    </main>

    <script type="module" src="app.js?v=frontend-modules-2"></script>
  </body>
</html>
